<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860">
<style>.bg{fill:#020617}.tx{font-family:Menlo,monospace;fill:#e2e8f0;font-size:20px}.ok{fill:#22c55e}.warn{fill:#f59e0b}.err{fill:#ef4444}.title{font-family:Arial,sans-serif;fill:#0f172a;font-size:34px;font-weight:700}</style>
<rect width="1400" height="860" fill="#ffffff"/>
<text x="50" y="60" class="title">Monitoring &amp; Heartbeat Log Snapshot (Demo)</text>
<rect x="50" y="100" width="1300" height="700" rx="14" ry="14" class="bg"/>
<text x="80" y="150" class="tx">[scheduler] tier order => [huawei, huoshan, baidu, tengxun]</text>
<text x="80" y="190" class="tx">[worker:huawei] heartbeat refreshed ttl=120s</text>
<text x="80" y="230" class="tx">[worker:baidu] active_jobs=1; traffic_used=8.2GB</text>
<text x="80" y="270" class="tx warn">[worker:huoshan] heartbeat stale 130s -> trigger check</text>
<text x="80" y="310" class="tx err">[monitor] worker=huoshan status=zombie -> alert email sent</text>
<text x="80" y="350" class="tx">[scheduler] failover route: new jobs -> huawei / baidu</text>
<text x="80" y="390" class="tx ok">[monitor] worker=huoshan recovered, heartbeat normal</text>
<text x="80" y="430" class="tx">[scheduler] queue depth=3, avg dispatch latency=1.8s</text>
<text x="80" y="470" class="tx">[monitor] alert cooldown set 3600s for same error type</text>
<text x="80" y="510" class="tx">[system] no global outage, service continues on healthy workers</text>
<text x="80" y="580" class="tx"># This screenshot-style panel is generated for portfolio demonstration.</text>
<text x="80" y="620" class="tx"># Sensitive credentials/endpoints are intentionally omitted.</text>
</svg>