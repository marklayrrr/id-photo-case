<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860">
<style>
.t{font-family:Arial,sans-serif;fill:#0f172a}.h{font-size:34px;font-weight:700}.s{font-size:18px}.b{fill:#eef2ff;stroke:#6366f1;stroke-width:2}.w{fill:#ecfeff;stroke:#06b6d4;stroke-width:2}.a{fill:#fff7ed;stroke:#f97316;stroke-width:2}.line{stroke:#334155;stroke-width:3;marker-end:url(#m)}
</style>
<defs><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
<text x="50" y="60" class="t h">Distributed ID Photo Workflow Architecture</text>
<text x="50" y="95" class="t s">Coordinator + Multi-Worker | Smart Scheduling | Failover | Heartbeat Alerts</text>
<rect x="70" y="150" rx="14" ry="14" width="220" height="90" class="a"/><text x="95" y="200" class="t s">Frontend / API Input</text>
<rect x="360" y="130" rx="14" ry="14" width="320" height="130" class="b"/><text x="395" y="185" class="t s">Coordinator (Tencent)</text><text x="395" y="212" class="t s">Queue + Tier Routing + Traffic Guard</text>
<rect x="770" y="90" rx="14" ry="14" width="250" height="90" class="w"/><text x="825" y="142" class="t s">Worker A (Huawei)</text>
<rect x="770" y="210" rx="14" ry="14" width="250" height="90" class="w"/><text x="825" y="262" class="t s">Worker B (Baidu)</text>
<rect x="1060" y="90" rx="14" ry="14" width="250" height="90" class="w"/><text x="1110" y="142" class="t s">Worker C (Volc)</text>
<rect x="1060" y="210" rx="14" ry="14" width="250" height="90" class="w"/><text x="1110" y="262" class="t s">Worker D (Tencent)</text>
<line x1="290" y1="195" x2="360" y2="195" class="line"/>
<line x1="680" y1="170" x2="770" y2="130" class="line"/>
<line x1="680" y1="195" x2="770" y2="255" class="line"/>
<line x1="680" y1="195" x2="1060" y2="130" class="line"/>
<line x1="680" y1="210" x2="1060" y2="255" class="line"/>
<rect x="360" y="330" rx="14" ry="14" width="950" height="110" class="a"/><text x="390" y="375" class="t s">Heartbeat Monitor (per worker) -> Alert within seconds when node fails</text><text x="390" y="405" class="t s">Failover strategy: route new tasks to healthy workers; avoid single-worker outage impact</text>
<rect x="70" y="500" rx="14" ry="14" width="1240" height="250" class="b"/>
<text x="100" y="545" class="t s">Capabilities:</text>
<text x="130" y="580" class="t s">• Smart scheduling: faster VPS gets more workload</text>
<text x="130" y="615" class="t s">• Traffic control per node to prevent quota overrun</text>
<text x="130" y="650" class="t s">• Horizontal scaling: add workers by deploying the worker package + dependencies</text>
<text x="130" y="685" class="t s">• Current public channel paused due to storage relay migration (core engine remains reusable)</text>
</svg>